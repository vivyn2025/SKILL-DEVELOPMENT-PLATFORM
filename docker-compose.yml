version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: skilldb
      POSTGRES_USER: skill_user
      POSTGRES_PASSWORD: skill_pass
    volumes:
      - db-data:/var/lib/postgresql/data
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://skill_user:skill_pass@db:5432/skilldb
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  db-data:
